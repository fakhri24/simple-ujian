<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ujian Selesai - Simple Ujian</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .container {
      text-align: center;
      max-width: 480px;
      padding: 2rem;
    }
    .icon {
      font-size: 4rem;
      margin-bottom: 1.5rem;
    }
    h1 {
      font-size: 1.8rem;
      margin-bottom: 1rem;
      color: #4ecca3;
    }
    p {
      font-size: 1.1rem;
      line-height: 1.6;
      opacity: 0.85;
      margin-bottom: 1.5rem;
    }
    .hint {
      font-size: 0.9rem;
      opacity: 0.6;
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 1px solid rgba(255,255,255,0.1);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">✅</div>
    <h1>Ujian Selesai</h1>
    <p>Anda telah keluar dari sesi ujian dengan aman. Jawaban Anda sudah tersimpan.</p>
    <p>Anda dapat menutup jendela browser ini.</p>
    <div class="hint">
      Jika Anda menggunakan Safe Exam Browser, tekan <strong>Ctrl+Q</strong> atau <strong>Cmd+Q</strong> untuk keluar.
    </div>
  </div>
</body>
</html>
