<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SEB Check (Fase 0 / 2)</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 24px; line-height: 1.5; max-width: 900px; }
    h2 { margin-top: 28px; border-bottom: 2px solid #e2e8f0; padding-bottom: 4px; }
    .verdict { font-size: 1.1rem; font-weight: 700; padding: 10px 14px; border-radius: 8px; margin: 12px 0; }
    .ok { background: #dcfce7; color: #166534; }
    .bad { background: #fee2e2; color: #991b1b; }
    .warn { background: #fef9c3; color: #854d0e; }
    pre { background: #f1f5f9; padding: 12px; border-radius: 8px; overflow: auto; font-size: 0.8rem; }
    button { font-size: 1rem; padding: 10px 18px; border-radius: 8px; cursor: pointer; margin: 4px 0; }
    input { font-size: 1rem; padding: 8px; border-radius: 6px; border: 1px solid #cbd5e1; }
    code { background: #e2e8f0; padding: 1px 4px; border-radius: 4px; }
  </style>
</head>
<body>
  <h1>SEB Check — Fase 0 / 2</h1>

  <h2>A. Diagnostik transport</h2>
  <button id="run">Jalankan tes transport (JS API + header)</button>
  <div id="api-verdict" class="verdict" style="display:none"></div>
  <pre id="api"></pre>
  <div id="hdr-verdict" class="verdict" style="display:none"></div>
  <pre id="hdr"></pre>

  <h2>B. Tes E2E backend <small>(validateSEB challenge → verify)</small></h2>
  <p>Membuktikan ConfigKey di server cocok dengan JS API. Login dulu (akun siswa),
  lalu klik. Halaman akan reload sekali dengan nonce di URL.</p>
  <div id="auth-area"></div>
  <div id="e2e-verdict" class="verdict" style="display:none"></div>
  <pre id="e2e"></pre>

  <h2>User-Agent</h2>
  <pre id="ua"></pre>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut }
      from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyD6aFkE8CEYA7ACXlF--BMV7XLkfi4fvWI",
      authDomain: "simple-ujian.firebaseapp.com",
      projectId: "simple-ujian",
      storageBucket: "simple-ujian.firebasestorage.app",
      messagingSenderId: "133707273043",
      appId: "1:133707273043:web:213433c1b1016f721587a6",
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const DIAG_EXAM_ID = "__seb_diag__";
    document.querySelector("#ua").textContent = navigator.userAgent;

    // --- baca configKey dari SEB JS API (hash dgn URL halaman) ---
    function getConfigKeyHash() {
      return new Promise((resolve) => {
        const api = window.SafeExamBrowser;
        if (!api || !api.security) return resolve(null);
        const read = () => api.security.configKey || null;
        if (typeof api.security.updateKeys === "function") {
          let done = false;
          const fin = () => { if (!done) { done = true; resolve(read()); } };
          try { api.security.updateKeys(fin); } catch (e) {}
          setTimeout(fin, 1500);
        } else { resolve(read()); }
      });
    }

    // ---------- A. Diagnostik transport ----------
    function readJsApiSnapshot() {
      return new Promise((resolve) => {
        const api = window.SafeExamBrowser;
        const base = {
          present: !!api,
          version: api && api.version ? api.version : null,
          hasSecurity: !!(api && api.security),
        };
        if (!api || !api.security) return resolve(base);
        getConfigKeyHash().then((ck) => resolve({ ...base, configKey: ck }));
      });
    }
    document.querySelector("#run").addEventListener("click", async () => {
      const apiV = document.querySelector("#api-verdict");
      const api = await readJsApiSnapshot();
      document.querySelector("#api").textContent = JSON.stringify(api, null, 2);
      apiV.style.display = "block";
      if (api.configKey) {
        apiV.className = "verdict ok";
        apiV.textContent = "✓ JS API tersedia (v" + (api.version || "?") + ") & configKey terisi.";
      } else {
        apiV.className = "verdict bad";
        apiV.textContent = "✗ JS API/configKey tidak ada (pastikan modern WebView).";
      }
      const hdrV = document.querySelector("#hdr-verdict");
      try {
        const data = await (await fetch("/sebEcho", { cache: "no-store" })).json();
        document.querySelector("#hdr").textContent = JSON.stringify(data.sebHeaders, null, 2);
        hdrV.style.display = "block";
        const hasCK = Object.keys(data.sebHeaders || {}).some(k => k.toLowerCase() === "x-safeexambrowser-configkeyhash");
        hdrV.className = "verdict " + (hasCK ? "warn" : "ok");
        hdrV.textContent = hasCK ? "⚠ Masih ada header (classic WebView)." : "— Tidak ada header SEB (modern WebView, sesuai harapan).";
      } catch (e) { hdrV.style.display = "block"; hdrV.className = "verdict bad"; hdrV.textContent = "Error /sebEcho: " + e.message; }
    });

    // ---------- B. E2E backend ----------
    async function callValidate(body) {
      const token = await auth.currentUser.getIdToken();
      const res = await fetch("/validateSEB", {
        method: "POST",
        headers: { "Content-Type": "application/json", Authorization: "Bearer " + token },
        body: JSON.stringify(body),
      });
      return { status: res.status, data: await res.json() };
    }

    async function startE2E() {
      const e2eV = document.querySelector("#e2e-verdict");
      e2eV.style.display = "block"; e2eV.className = "verdict warn"; e2eV.textContent = "Meminta nonce...";
      try {
        const { data } = await callValidate({ step: "challenge", examId: DIAG_EXAM_ID });
        if (!data.ok) throw new Error("challenge: " + JSON.stringify(data));
        const u = new URL(location.href);
        u.searchParams.set("e2e_nonce", data.nonce);
        location.href = u.toString(); // reload dgn nonce di URL → configKey ikut nonce
      } catch (e) { e2eV.className = "verdict bad"; e2eV.textContent = "Gagal challenge: " + e.message; }
    }

    async function continueE2E(nonce) {
      const e2eV = document.querySelector("#e2e-verdict");
      const e2ePre = document.querySelector("#e2e");
      e2eV.style.display = "block"; e2eV.className = "verdict warn"; e2eV.textContent = "Membaca configKey & verify...";
      try {
        const configKeyHash = await getConfigKeyHash();
        if (!configKeyHash) throw new Error("configKey JS API kosong");
        const pageUrl = location.href;
        const { status, data } = await callValidate({ step: "verify", examId: DIAG_EXAM_ID, nonce, configKeyHash, pageUrl });
        e2ePre.textContent = JSON.stringify({ status, pageUrl, configKeyHash, response: data }, null, 2);
        if (data.ok) {
          e2eV.className = "verdict ok";
          e2eV.textContent = "✓ LULUS: server mencocokkan ConfigKey. Backend Fase 2 benar — siap Fase 3.";
        } else if (data.error === "config_key_mismatch") {
          e2eV.className = "verdict bad";
          e2eV.textContent = "✗ config_key_mismatch: ConfigKey di secret TIDAK cocok dgn config .seb ini. Periksa nilai SEB_CONFIG_KEY.";
        } else {
          e2eV.className = "verdict bad";
          e2eV.textContent = "✗ Gagal: " + data.error + " (HTTP " + status + ")";
        }
        // bersihkan nonce dari URL
        const u = new URL(location.href); u.searchParams.delete("e2e_nonce");
        history.replaceState({}, "", u.toString());
      } catch (e) { e2eV.className = "verdict bad"; e2eV.textContent = "Error verify: " + e.message; }
    }

    function renderAuth(user) {
      const area = document.querySelector("#auth-area");
      if (user) {
        area.innerHTML = `<p>Login sebagai <strong>${user.email || user.uid}</strong> ·
          <button id="logout">logout</button></p>
          <button id="e2e-start">Jalankan tes E2E backend</button>`;
        document.querySelector("#logout").onclick = () => signOut(auth);
        document.querySelector("#e2e-start").onclick = startE2E;
      } else {
        area.innerHTML = `<input id="email" type="email" placeholder="email siswa" />
          <input id="pwd" type="password" placeholder="password" />
          <button id="login">Login</button> <span id="login-err" style="color:#991b1b"></span>`;
        document.querySelector("#login").onclick = async () => {
          try {
            await signInWithEmailAndPassword(auth, document.querySelector("#email").value, document.querySelector("#pwd").value);
          } catch (e) { document.querySelector("#login-err").textContent = e.message; }
        };
      }
    }

    onAuthStateChanged(auth, (user) => {
      renderAuth(user);
      const nonce = new URLSearchParams(location.search).get("e2e_nonce");
      if (user && nonce) continueE2E(nonce); // lanjutkan setelah reload
    });
  </script>
</body>
</html>
