<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Ujian - Login</title>
    <link rel="stylesheet" href="/css/main.css" />
  </head>
  <body>
    <main class="auth-shell">
      <section class="card">
        <h1>Simple Ujian</h1>

        <form id="login-form" class="stack">
          <label for="email">Email</label>
          <input
            id="email"
            name="email"
            type="email"
            required
            autocomplete="email"
          />

          <label for="password">Password</label>
          <input
            id="password"
            name="password"
            type="password"
            required
            autocomplete="current-password"
          />

          <button type="submit">Masuk</button>
        </form>

        <p
          id="login-feedback"
          class="feedback"
          role="status"
          aria-live="polite"
        ></p>
      </section>
    </main>

    <script type="module" src="/js/pages/loginPage.js"></script>
  </body>
</html>
