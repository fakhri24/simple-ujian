<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Ujian - Login</title>
    <link rel="stylesheet" href="/css/main.css" />
  </head>
  <body>
    <main class="auth-shell">
      <section class="card">
        <h1>Simple Ujian</h1>

        <!-- Loading State during browser check -->
        <div id="seb-loading" class="stack" style="text-align: center; padding: 1.5rem 0;">
          <div style="font-size: 2rem; animation: rotate 2s linear infinite;">⏳</div>
          <p style="color: var(--muted); margin: 0.5rem 0 0 0;">Memeriksa keamanan browser...</p>
        </div>

        <!-- Lockdown Warning & Download Container (Hidden by default)
             Diisi per-platform (SEB/SUB) oleh renderLockdownWarning() di
             js/pages/loginPage.js — lihat lockdownGuidance() di js/lockdown.js. -->
        <div id="seb-warning-container" class="stack" style="display: none; text-align: center;"></div>

         <!-- Login Form Container (Hidden by default) -->
        <div id="login-container" style="display: none;">
          <div id="seb-active-banner" style="background: var(--brand-light); border-left: 4px solid var(--brand); padding: 0.75rem; border-radius: 8px; font-size: 0.85rem; color: var(--brand); margin-bottom: 1rem; font-weight: 500; text-align: center;">
            ✓ Safe Exam Browser Aktif & Aman
          </div>

          <form id="login-form" class="stack">
            <label for="email">Email</label>
            <input
              id="email"
              name="email"
              type="email"
              required
              autocomplete="email"
            />

            <label for="password">Password</label>
            <input
              id="password"
              name="password"
              type="password"
              required
              autocomplete="current-password"
            />

            <button type="submit" style="width: 100%;">Masuk</button>
          </form>
        </div>

        <p
          id="login-feedback"
          class="feedback"
          role="status"
          aria-live="polite"
          style="margin-top: 1rem;"
        ></p>
      </section>
    </main>

    <!-- Keyframe animation in index.html for loading rotation -->
    <style>
      @keyframes rotate {
        100% { transform: rotate(360deg); }
      }
    </style>

    <script type="module" src="/js/pages/loginPage.js"></script>
  </body>
</html>
