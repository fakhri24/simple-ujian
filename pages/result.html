<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hasil Ujian</title>
    <link rel="stylesheet" href="/css/main.css" />
  </head>
  <body>
    <!-- Global Loading Screen -->
    <div id="global-loading-screen" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #f1f5f9; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999999; font-family: 'Outfit', sans-serif; transition: opacity 0.4s ease, visibility 0.4s ease;">
      <div style="text-align: center; max-width: 400px; padding: 2rem; display: flex; flex-direction: column; align-items: center; gap: 1.5rem;">
        <div class="anti-cheat-icon" style="font-size: 4rem;">⏳</div>
        <div style="font-weight: 800; font-size: 1.6rem; background: linear-gradient(135deg, #4f46e5 0%, #3b82f6 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Memuat Hasil Ujian</div>
        <p style="color: #64748b; font-size: 0.95rem; line-height: 1.6; margin: 0;">Sistem sedang mengambil hasil pengerjaan ujian Anda dari server. Mohon tunggu sebentar...</p>
        <div style="width: 100%; height: 6px; background: #e2e8f0; border-radius: 9999px; overflow: hidden; margin-top: 1rem; position: relative;">
          <div style="width: 50%; height: 100%; background: linear-gradient(90deg, #4f46e5, #3b82f6); border-radius: 9999px; position: absolute; top: 0; left: 0; animation: loadingBar 1.5s infinite ease-in-out;"></div>
        </div>
      </div>
    </div>

    <header class="topbar">
      <h1>Hasil Ujian</h1>
      <a class="link-btn" href="/pages/student.html">Kembali ke Daftar</a>
    </header>

    <main class="container">
      <section class="card" style="text-align: center; margin-bottom: 2rem;">
        <p style="margin: 0; font-size: 1.1rem; color: var(--muted); font-weight: 500;">Total Skor</p>
        <h2 id="result-score" style="margin: 0.5rem 0 0 0;">0</h2>
      </section>

      <h3 style="margin-bottom: 1.5rem; color: var(--text);">Detail Jawaban</h3>
      <div id="result-breakdown" class="stack"></div>
    </main>

    <script type="module" src="/js/pages/resultPage.js"></script>
  </body>
</html>
